<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>デッキと慈悲(仮)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
  <div id="ttl">デッキと慈悲</div>
  <div id="sub">- DECK & MERCY -</div>
  <div id="panel">
    <label>なまえ</label>
    <input id="inUser" maxlength="12" autocomplete="username">
    <label>パスワード</label>
    <input id="inPass" type="password" autocomplete="current-password">
    <div id="btnrow">
      <button class="lbtn" id="loginBtn">▶ ログイン</button>
      <button class="lbtn" id="regBtn">しんき とうろく</button>
    </div>
    <div id="loginMsg"></div>
  </div>
</div>

<div id="wrap">
  <div id="hud">
    <span id="hudL">LV 1</span>
    <span><span id="dot"></span><span id="hudR">HP 20/20  ⛃0</span><button id="menuBtn">☰ メニュー</button></span>
  </div>
  <div id="cvbox"><canvas id="bt" width="192" height="320"></canvas></div>
  <div id="ui">
    <div id="dlg">* ...</div>
    <div id="hand"></div>
    <div id="items"></div>
  </div>
</div>

<div id="scrim"></div>
<div id="drawer">
  <div class="dttl">☰ メニュー</div>
  <button class="pbtn" data-scr="deck">🃏 デッキ</button>
  <button class="pbtn" data-scr="gacha">🎰 ガチャ</button>
  <button class="pbtn" data-scr="market">🏪 マーケット</button>
  <button class="pbtn" data-scr="rank">🏆 ランキング</button>
  <button class="pbtn" data-scr="friends">👥 フレンド</button>
  <button class="pbtn" data-scr="room">⚔ きょうりょくバトル</button>
  <button class="pbtn" data-scr="admin" id="adminBtn" style="display:none;border-color:#ff9a3c;color:#ff9a3c">🛠 システム</button>
  <button class="pbtn" id="soundBtn">🔊 おと: ON</button>
  <button class="pbtn" id="logoutBtn">🚪 ログアウト</button>
</div>

<div id="giftBanner"></div>

<div id="screen">
  <div id="screenHead">
    <button id="screenBack">← もどる</button>
    <span id="screenTitle"></span>
  </div>
  <div id="screenBody"></div>
</div>

<div id="invite">
  <div id="invBox">
    <div id="invText"></div>
    <div class="grow2">
      <button class="fbtn gold" id="invYes">▶ はいる</button>
      <button class="fbtn" id="invNo">ことわる</button>
    </div>
  </div>
</div>

<div id="gachaFx">
  <div id="gachaFxBox">
    <div id="gachaFxBurst"></div>
    <div id="gachaFxRar"></div>
    <div id="gachaFxName"></div>
    <div id="gachaFxDesc"></div>
    <button class="fbtn gold" id="gachaFxOk">やったー!</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
